# Server identity exposed through MCP initialize responses.
server:
  name: web # MCP server name.
  instructions: 使用 Exa 搜索网页、使用 Jina 或代码托管原始文件读取页面，并在页面内容中执行正则查找。 # MCP instructions.
  host: 127.0.0.1 # Bind address.
  port: 18080 # Bind port.
  log_level: info # Trace log level.
  streamable_http_path: /mcp # MCP HTTP endpoint.
  health_path: /health # Health-check endpoint.
  protocol_version: "2025-06-18" # MCP protocol version.

# Header names expected from MCP HTTP clients.
headers:
  exa_api_key: x-exa-api-key # Exa API key header.
  jina_api_key: x-jina-api-key # Jina API key header.

# Exa search behavior.
search:
  endpoint: https://api.exa.ai/search # Exa search endpoint.
  num_results: 15 # Results per request.
  type: deep-lite # Exa search type.
  highlights_max_characters: 1000 # Highlight character budget.
  max_age_hours: 9007199254740991 # Cache age policy sent to Exa.
  livecrawl_timeout: 30000 # Exa livecrawl timeout in milliseconds.

# HTTP client behavior for all outbound requests.
http:
  timeout_seconds: 120.0 # Jina and Exa timeout.
  direct_fetch_timeout_seconds: 20.0 # Direct fetch timeout.
  max_redirects: 5 # Redirect hops after per-hop SSRF validation.

# Jina Reader API behavior.
jina:
  endpoint: https://r.jina.ai/ # Jina Reader endpoint.
  accept: text/event-stream # Preferred response media type.
  return_format: markdown # Requested output format.
  engine: cf-browser-rendering # Reader rendering engine.
  locale: en-US # Reader locale.
  no_cache: true # Ask Jina not to reuse cached pages.
  respond_with: readerlm-v2 # Jina response strategy.
  retain_images: none # Image retention policy.
  with_shadow_dom: true # Include shadow DOM while rendering.
  viewport:
    width: 1920 # Browser viewport width.
    height: 1080 # Browser viewport height.

# Token chunking behavior.
chunking:
  tokenizer: o200k_base # Tokenizer name.
  chunk_tokens: 5000 # Maximum tokens in one chunk.
  overlap_ratio: 0.1 # Chunk overlap ratio.

# Regex find behavior.
find:
  default_snippet_tokens: 200 # Default snippet token budget.
  max_matches_per_page: 50 # Maximum matches returned per page.

# Direct fetch behavior before falling back to Jina.
direct_fetch:
  max_bytes: 1048576 # Maximum accepted direct response bytes.
  github_hosts: # GitHub-style hosts.
    - github.com
    - raw.githubusercontent.com
    - gist.githubusercontent.com
  huggingface_hosts: # Hugging Face-style hosts.
    - huggingface.co
  gitlab_hosts: # GitLab-style hosts.
    - gitlab.com
  bitbucket_hosts: # Bitbucket-style hosts.
    - bitbucket.org
  text_file_extensions: # Extensions eligible for raw text fetch.
    - .txt
    - .md
    - .rst
    - .py
    - .pyi
    - .js
    - .jsx
    - .ts
    - .tsx
    - .json
    - .yaml
    - .yml
    - .toml
    - .ini
    - .cfg
    - .xml
    - .html
    - .css
    - .scss
    - .go
    - .rs
    - .java
    - .kt
    - .c
    - .h
    - .cpp
    - .hpp
    - .cs
    - .php
    - .rb
    - .sh
    - .ps1
    - .sql
    - .dockerfile
    - .env
  text_file_names: # Extensionless file names eligible for raw text fetch.
    - README
    - LICENSE
    - NOTICE
    - Dockerfile
    - Makefile

# SSRF defenses for user-controlled URLs and redirects.
ssrf:
  block_private_networks: true # Reject loopback, private, link-local, and reserved IPs.
  block_local_hostnames: true # Reject localhost-style names before DNS lookup.
